<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tabla de Goleadores - Chimuelos</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <!-- Sección Gol de la Fecha -->
    <section class="gol-fecha">
        <h2>⚽ Gol de la Fecha</h2>
        <div class="gol-container">
            <p><strong>Jugador:</strong> Lautaro Mundo 🌍 </p>
            <p><strong>Partido:</strong> Chimuelos (partido entre nosotros)</p>
            <p><strong>Descripción:</strong> Diego pivotea y golazo a la escuadra. </p>
            <video autoplay muted loop controls class="gol-video">
                <source src="Gol.mp4" type="video/mp4">
                Tu navegador no soporta video.
            </video>
        </div>
    </section>

    <!-- Barra de progreso -->
    <div id="progress"></div>

    <!-- Título -->
    <div class="titulo-container">
        <img src="logo.png" alt="Logo del equipo" class="logo">
        <h1 class="titulo">Chimuelos - Tabla de Goleadores</h1>
    </div>

    <!-- Tabla dinámica -->
    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Goles</th>
                <th>Partidos</th>
                <th>Promedio</th>
                <th>Posición</th>
            </tr>
        </thead>
        <tbody>
            <!-- Aquí se insertan las filas automáticamente -->
        </tbody>
    </table>

    <!-- Música de fondo -->
    <audio id="musica" loop>
        <source src="musica_fondo.mp3" type="audio/mp3">
    </audio>

    <!-- Footer -->
    <footer>
        © 2026 Chimuelos FC - Todos los derechos reservados
    </footer>

    <!-- Librería SheetJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- Script para cargar Excel -->
    <script>
    async function cargarTabla() {
        const response = await fetch("Tabla Unificada.xlsx");
        const data = await response.arrayBuffer();

        const workbook = XLSX.read(data, { type: "array" });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];

        // Convertir a JSON usando encabezados
        const jugadores = XLSX.utils.sheet_to_json(sheet);

        const tbody = document.querySelector("table tbody");
        tbody.innerHTML = "";

        jugadores.forEach(jugador => {
            const nombre = jugador.Nombre;
            const goles = jugador.Goles;
            const partidos = jugador.PJ;
            const posicion = jugador.posicion;

            // Calcular promedio
            const promedio = partidos > 0 ? (goles / partidos).toFixed(2) : "0.00";

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${nombre}</td>
                <td>${goles}</td>
                <td>${partidos}</td>
                <td>${promedio}</td>
                <td>${posicion}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    document.addEventListener("DOMContentLoaded", cargarTabla);

    // Script para música al primer clic
    document.addEventListener("click", function () {
        const audio = document.getElementById("musica");
        audio.play();
    }, { once: true });
    </script>

    <!-- Script de scroll -->
    <script src="scroll.js"></script>
</body>
</html>
